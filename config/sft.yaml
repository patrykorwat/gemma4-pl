defaults:
  - base

stage: sft

data:
  # Packed Polish text shards produced by scripts/prepare_sft_data.py.
  # Each file is a JSONL with one {"text": "..."} record per row, already
  # normalized and language filtered. Packing into fixed length sequences
  # happens inside the trainer.
  train_files:
    - ${paths.data_root}/corpus/packed/train/part-0000.jsonl
    - ${paths.data_root}/corpus/packed/train/part-0001.jsonl
    - ${paths.data_root}/corpus/packed/train/part-0002.jsonl
    - ${paths.data_root}/corpus/packed/train/part-0003.jsonl
  validation_files:
    - ${paths.data_root}/corpus/packed/val/part-0000.jsonl
  # Optional instruction slice drawn from CKE matura items. Interleaved at
  # the data loader level, at most ~5 percent of steps. Empty by default.
  instruction_files: []
  instruction_mix_ratio: 0.0
  text_field: text
  max_seq_length: 4096
  packing: true
  shuffle_seed: ${project.seed}

training:
  per_device_train_batch_size: 2
  per_device_eval_batch_size: 2
  gradient_accumulation_steps: 32
  num_train_epochs: 1
  learning_rate: 5.0e-5
  lr_scheduler_type: cosine
  warmup_ratio: 0.03
  weight_decay: 0.01
  adam_beta1: 0.9
  adam_beta2: 0.95
  max_grad_norm: 1.0
  gradient_checkpointing: true
  bf16: true
  tf32: true
  optim: adamw_torch_fused
  save_strategy: steps
  save_steps: 2000
  save_total_limit: 3
  eval_strategy: steps
  eval_steps: 1000
  logging_steps: ${logging.logging_steps}
  ddp_find_unused_parameters: false
  dataloader_num_workers: 8
  dataloader_pin_memory: true

peft:
  enabled: false

loss:
  label_smoothing: 0.0
  # Full sequence loss for causal LM on the text corpus. The CKE
  # instruction slice (if enabled) is handled by masking the prompt
  # portion inside the data collator.
  completion_only: false
